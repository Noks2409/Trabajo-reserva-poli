{% extends "base.html" %}
{% block title %}Nuevo Espacio{% endblock %}
{% block content %}
<div class="page-header">
  <h1>Registrar espacio</h1>
  <p>Agrega un nuevo espacio disponible para reservas</p>
</div>
<div style="max-width:440px;">
  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label>Nombre del espacio</label>
        <input type="text" name="nombre" placeholder="ej: Auditorio Principal" required/>
      </div>
      <div class="form-group">
        <label>Capacidad (personas)</label>
        <input type="number" name="capacidad" placeholder="ej: 150" min="1" required/>
      </div>
      <div style="display:flex; gap:.75rem;">
        <button type="submit" class="btn btn-primary">Registrar</button>
        <a href="{{ url_for('admin_espacios') }}" class="btn btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
