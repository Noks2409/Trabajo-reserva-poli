{% extends "base.html" %}
{% block title %}Editar perfil{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Editar perfil</h1>
  <p>Actualiza tu información personal</p>
</div>

<div style="max-width:560px;">
  <div class="card">
    <form method="POST">

      <div class="form-group">
        <label>Nombre completo</label>
        <input type="text" name="nombre" value="{{ usuario.nombre }}" required/>
      </div>

      <div class="form-group">
        <label>Nueva contraseña <span style="color:var(--muted); text-transform:none; font-size:.75rem;">(déjala vacía si no quieres cambiarla)</span></label>
        <input type="password" name="contrasena" placeholder="Nueva contraseña"/>
      </div>

      <!-- Campos según rol -->
      {% if usuario.rol == 'docente' %}
      <div class="grid-2" style="display:grid; grid-template-columns:1fr 1fr; gap:.75rem;">
        <div class="form-group">
          <label>Código docente</label>
          <input type="text" name="cod_docente" value="{{ usuario.cod_docente or '' }}"/>
        </div>
        <div class="form-group">
          <label>Departamento</label>
          <input type="text" name="departamento" value="{{ usuario.departamento or '' }}"/>
        </div>
      </div>

      {% elif usuario.rol == 'administrativo' %}
      <div class="form-group">
        <label>Dependencia</label>
        <input type="text" name="dependencia" value="{{ usuario.dependencia or '' }}"/>
      </div>

      {% elif usuario.rol == 'externa' %}
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:.75rem;">
        <div class="form-group">
          <label>Empresa</label>
          <input type="text" name="empresa" value="{{ usuario.empresa or '' }}"/>
        </div>
        <div class="form-group">
          <label>Teléfono</label>
          <input type="text" name="telefono" value="{{ usuario.telefono or '' }}"/>
        </div>
      </div>
      {% endif %}

      <hr>
      <div style="display:flex; gap:.75rem;">
        <button type="submit" class="btn btn-primary">💾 Guardar cambios</button>
        <a href="{{ url_for('perfil') }}" class="btn btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
