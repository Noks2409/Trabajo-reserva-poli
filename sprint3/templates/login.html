<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iniciar sesión — Reservas</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1117; --surface: #181b24; --border: #252a38;
      --accent: #4f8ef7; --text: #e8eaf0; --muted: #6b7280;
      --success: #34c77b; --danger: #e05252; --radius: 10px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
    }
    .login-wrap {
      width: 100%;
      max-width: 420px;
      padding: 1rem;
    }
    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo-icon {
      font-size: 2.8rem;
      display: block;
      margin-bottom: .5rem;
    }
    .logo h1 {
      font-size: 1.3rem;
      font-weight: 600;
    }
    .logo p {
      font-size: .8rem;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      margin-top: .2rem;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
    }
    .form-group { margin-bottom: 1.1rem; }
    label {
      display: block;
      font-size: .75rem;
      color: var(--muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: .4rem;
    }
    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: .7rem .9rem;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: .9rem;
      transition: border-color .2s;
    }
    input:focus { outline: none; border-color: var(--accent); }
    input::placeholder { color: var(--muted); }
    .btn {
      width: 100%;
      padding: .75rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: .9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .2s;
      margin-top: .5rem;
    }
    .btn:hover { background: #3a7de8; }
    .alerts { margin-bottom: 1rem; }
    .alert {
      padding: .65rem .9rem;
      border-radius: var(--radius);
      font-size: .85rem;
      border-left: 3px solid;
      margin-bottom: .5rem;
    }
    .alert-danger  { background: #2e1a1a; border-color: var(--danger); color: #f08080; }
    .alert-success { background: #1a2e22; border-color: var(--success); color: #6fe8a4; }
    .alert-info    { background: #122630; border-color: #50c8e8; color: #7dd9f0; }
    .alert-warning { background: #2e2510; border-color: #f5a623; color: #f5c842; }
    .footer-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: .85rem;
      color: var(--muted);
    }
    .footer-link a { color: var(--accent); }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="logo">
    <span class="logo-icon">🏛</span>
    <h1>Sistema de Reservas</h1>
    <p>Gestión de espacios del auditorio</p>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="alerts">
        {% for cat, msg in messages %}
          <div class="alert alert-{{ cat }}">{{ msg }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" name="correo" placeholder="correo@universidad.edu" required autofocus/>
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" name="contrasena" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn">Iniciar sesión</button>
    </form>
  </div>

  <p class="footer-link">
    ¿No tienes cuenta? <a href="{{ url_for('registro') }}">Regístrate aquí</a>
  </p>
</div>
</body>
</html>
