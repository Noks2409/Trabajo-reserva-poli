<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registro — Reservas</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1117; --surface: #181b24; --border: #252a38;
      --accent: #4f8ef7; --text: #e8eaf0; --muted: #6b7280;
      --success: #34c77b; --danger: #e05252; --radius: 10px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: grid; place-items: center; padding: 2rem 1rem; }
    .wrap { width: 100%; max-width: 480px; }
    .logo { text-align: center; margin-bottom: 2rem; }
    .logo h1 { font-size: 1.2rem; font-weight: 600; }
    .logo p  { font-size: .8rem; color: var(--muted); margin-top: .2rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; }
    h2 { font-size: 1rem; font-weight: 600; margin-bottom: 1.5rem; }
    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: .75rem; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: .06em; margin-bottom: .4rem; }
    input, select { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: .65rem .9rem; border-radius: var(--radius); font-family: inherit; font-size: .9rem; transition: border-color .2s; }
    input:focus, select:focus { outline: none; border-color: var(--accent); }
    select option { background: var(--surface); }
    .extra-fields { display: none; margin-top: .5rem; padding: 1rem; background: var(--bg); border-radius: var(--radius); border: 1px solid var(--border); }
    .extra-fields.visible { display: block; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
    .btn { width: 100%; padding: .75rem; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-family: inherit; font-size: .9rem; font-weight: 500; cursor: pointer; transition: background .2s; margin-top: .5rem; }
    .btn:hover { background: #3a7de8; }
    .alerts { margin-bottom: 1rem; }
    .alert { padding: .65rem .9rem; border-radius: var(--radius); font-size: .85rem; border-left: 3px solid; margin-bottom: .5rem; }
    .alert-danger { background: #2e1a1a; border-color: var(--danger); color: #f08080; }
    .footer-link { text-align: center; margin-top: 1.5rem; font-size: .85rem; color: var(--muted); }
    .footer-link a { color: var(--accent); }
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <h1>🏛 Sistema de Reservas</h1>
    <p>Crear nueva cuenta</p>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="alerts">
        {% for cat, msg in messages %}
          <div class="alert alert-{{ cat }}">{{ msg }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <div class="card">
    <h2>Datos de la cuenta</h2>
    <form method="POST">
      <div class="grid-2">
        <div class="form-group">
          <label>Nombre completo</label>
          <input type="text" name="nombre" required placeholder="Tu nombre"/>
        </div>
        <div class="form-group">
          <label>Tipo de usuario</label>
          <select name="rol" id="rolSelect" required>
            <option value="">Selecciona...</option>
            <option value="docente">Docente</option>
            <option value="administrativo">Administrativo</option>
            <option value="externa">Persona Externa</option>
            <option value="admin">Admin</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" name="correo" required placeholder="correo@universidad.edu"/>
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" name="contrasena" required placeholder="Mínimo 6 caracteres"/>
      </div>

      <!-- Campos extra para Docente -->
      <div class="extra-fields" id="fields-docente">
        <div class="grid-2">
          <div class="form-group">
            <label>Código docente</label>
            <input type="text" name="cod_docente" placeholder="DOC-001"/>
          </div>
          <div class="form-group">
            <label>Departamento</label>
            <input type="text" name="departamento" placeholder="Ingeniería"/>
          </div>
        </div>
      </div>

      <!-- Campos extra para Administrativo -->
      <div class="extra-fields" id="fields-administrativo">
        <div class="form-group">
          <label>Dependencia</label>
          <input type="text" name="dependencia" placeholder="Recursos Humanos"/>
        </div>
      </div>

      <!-- Campos extra para Persona Externa -->
      <div class="extra-fields" id="fields-externa">
        <div class="grid-2">
          <div class="form-group">
            <label>Empresa</label>
            <input type="text" name="empresa" placeholder="Empresa S.A."/>
          </div>
          <div class="form-group">
            <label>Teléfono</label>
            <input type="text" name="telefono" placeholder="+57 300 000 0000"/>
          </div>
        </div>
      </div>

      <button type="submit" class="btn">Registrarse</button>
    </form>
  </div>
  <p class="footer-link">¿Ya tienes cuenta? <a href="{{ url_for('login') }}">Inicia sesión</a></p>
</div>

<script>
  const select = document.getElementById('rolSelect');
  const extras = ['docente', 'administrativo', 'externa'];

  select.addEventListener('change', () => {
    extras.forEach(r => {
      const el = document.getElementById('fields-' + r);
      if (el) el.classList.toggle('visible', select.value === r);
    });
  });
</script>
</body>
</html>
